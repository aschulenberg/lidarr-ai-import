# For Unraid's "Compose Manager" plugin (Community Apps -> search "Compose Manager").
#
# Setup:
#   1. Install the Compose Manager plugin if you don't have it.
#   2. SSH/terminal into Unraid and clone this repo onto the array:
#        git clone https://github.com/aschulenberg/lidarr-ai-import /mnt/user/appdata/lidarr-ai-import/repo
#   3. Copy .env.example to /mnt/user/appdata/lidarr-ai-import/.env and fill it in.
#   4. In Compose Manager, add a new stack pointing at
#      /mnt/user/appdata/lidarr-ai-import/repo, using this file.
#   5. Edit the two placeholders below, then bring the stack up.
#
# IMPORTANT - path matching: the music/downloads paths MUST be the exact same
# container-side paths your Lidarr container uses (check Lidarr's Docker
# template -> "Path" mappings in the Unraid UI). Manual-import file paths come
# back from Lidarr's own API as Lidarr's container sees them, so this
# container needs to resolve the identical path or tag-reading will fail.
# Example: if Lidarr maps /mnt/user/Music -> /music, mount the same pair here.
services:
  lidarr-ai-import:
    build: /mnt/user/appdata/lidarr-ai-import/repo
    container_name: lidarr-ai-import
    env_file: /mnt/user/appdata/lidarr-ai-import/.env
    environment:
      # Joining Lidarr's network means you can address it by container name
      # instead of the host LAN IP, e.g. http://lidarr:8686 - replace
      # <UNRAID-IP> with that if you'd rather use the name (confirm Lidarr's
      # actual container_name first; it's case-sensitive). The LAN IP keeps
      # working fine either way, this is just optional tidiness.
      - LIDARR_URL=http://<UNRAID-IP>:8686
    volumes:
      - /mnt/user/<YOUR-MUSIC-SHARE>:/music        # <- match Lidarr's container path exactly
      - /mnt/user/<YOUR-DOWNLOADS-SHARE>:/downloads # <- match Lidarr's container path exactly
      - /mnt/user/appdata/lidarr-ai-import/data:/app/data
    networks:
      - custom-bridge
    restart: unless-stopped

networks:
  custom-bridge:
    # Must already exist (this is the network your Lidarr container is on) -
    # `external: true` means compose joins it rather than trying to create
    # it. Confirm the exact name with `docker network ls` on Unraid; if
    # yours differs from "custom-bridge", change both lines below to match.
    external: true
    name: custom-bridge
